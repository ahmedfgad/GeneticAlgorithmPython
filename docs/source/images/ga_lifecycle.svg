<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 740" width="760" height="740" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif">
  <defs>
    <marker id="lc-arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6470"/>
    </marker>
    <marker id="lc-arrow-green" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0b6e4f"/>
    </marker>
  </defs>

  <!-- card background -->
  <rect x="2" y="2" width="756" height="736" rx="16" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>

  <!-- title -->
  <text x="380" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2d3d">The PyGAD genetic algorithm life cycle</text>

  <!-- ===== edges ===== -->
  <line x1="380" y1="120" x2="380" y2="154" stroke="#5b6470" stroke-width="2" marker-end="url(#lc-arrow)"/>
  <line x1="380" y1="212" x2="380" y2="236" stroke="#5b6470" stroke-width="2" marker-end="url(#lc-arrow)"/>
  <line x1="490" y1="290" x2="558" y2="290" stroke="#5b6470" stroke-width="2" marker-end="url(#lc-arrow)"/>
  <line x1="380" y1="342" x2="380" y2="370" stroke="#5b6470" stroke-width="2" marker-end="url(#lc-arrow)"/>
  <line x1="380" y1="428" x2="380" y2="462" stroke="#5b6470" stroke-width="2" marker-end="url(#lc-arrow)"/>
  <line x1="380" y1="520" x2="380" y2="554" stroke="#5b6470" stroke-width="2" marker-end="url(#lc-arrow)"/>
  <line x1="380" y1="612" x2="380" y2="646" stroke="#5b6470" stroke-width="2" marker-end="url(#lc-arrow)"/>
  <!-- loop back: B6 left -> up -> into B2 left -->
  <polyline points="210,678 110,678 110,184 228,184" fill="none" stroke="#0b6e4f" stroke-width="2.5" marker-end="url(#lc-arrow-green)"/>

  <!-- edge labels -->
  <g font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="14" font-weight="700">
    <text x="520" y="282" fill="#334155">yes</text>
    <text x="392" y="362" fill="#334155">no</text>
  </g>
  <text x="96" y="430" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b6e4f" transform="rotate(-90 96 430)">repeat for each generation</text>

  <!-- ===== nodes ===== -->
  <!-- B1 -->
  <rect x="230" y="64" width="300" height="56" rx="10" fill="#eef4fb" stroke="#3b6ea5" stroke-width="2"/>
  <text x="380" y="98" text-anchor="middle" font-size="15" fill="#1f2d3d">Create the initial population</text>

  <!-- B2 -->
  <rect x="230" y="156" width="300" height="56" rx="10" fill="#eef4fb" stroke="#3b6ea5" stroke-width="2"/>
  <text x="380" y="190" text-anchor="middle" font-size="15" fill="#1f2d3d">Calculate the fitness of every solution</text>

  <!-- Decision diamond -->
  <polygon points="380,238 490,290 380,342 270,290" fill="#fff7e6" stroke="#d9a441" stroke-width="2"/>
  <text x="380" y="295" text-anchor="middle" font-size="15" fill="#1f2d3d">Stop criteria met?</text>

  <!-- Return best (end) -->
  <rect x="558" y="262" width="178" height="56" rx="10" fill="#e9f7ef" stroke="#0b6e4f" stroke-width="2"/>
  <text x="647" y="289" text-anchor="middle" font-size="15" font-weight="700" fill="#0b6e4f">Return the</text>
  <text x="647" y="308" text-anchor="middle" font-size="15" font-weight="700" fill="#0b6e4f">best solution</text>

  <!-- B3 -->
  <rect x="230" y="370" width="300" height="56" rx="10" fill="#eef4fb" stroke="#3b6ea5" stroke-width="2"/>
  <text x="380" y="404" text-anchor="middle" font-size="15" fill="#1f2d3d">Select the parents</text>

  <!-- B4 -->
  <rect x="230" y="462" width="300" height="56" rx="10" fill="#eef4fb" stroke="#3b6ea5" stroke-width="2"/>
  <text x="380" y="496" text-anchor="middle" font-size="15" fill="#1f2d3d">Apply crossover to make offspring</text>

  <!-- B5 -->
  <rect x="230" y="554" width="300" height="56" rx="10" fill="#eef4fb" stroke="#3b6ea5" stroke-width="2"/>
  <text x="380" y="588" text-anchor="middle" font-size="15" fill="#1f2d3d">Apply mutation to the offspring</text>

  <!-- B6 -->
  <rect x="210" y="646" width="340" height="62" rx="10" fill="#e9f7ef" stroke="#0b6e4f" stroke-width="2"/>
  <text x="380" y="672" text-anchor="middle" font-size="15" font-weight="700" fill="#0b6e4f">Build the next generation</text>
  <text x="380" y="692" text-anchor="middle" font-size="13" fill="#334155">keep elites or parents, then add the offspring</text>
</svg>
