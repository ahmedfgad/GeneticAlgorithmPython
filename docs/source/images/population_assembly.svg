<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif">
  <!-- card background -->
  <rect x="2" y="2" width="896" height="466" rx="16" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>

  <!-- title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2d3d">How the next population is built</text>
  <text x="450" y="64" text-anchor="middle" font-size="13.5" fill="#6b7280">example: sol_per_pop = 8, kept = 2</text>

  <!-- population column: 8 cells -->
  <!-- cell height 38, start y=92, x 150..370 -->
  <!-- index labels + cells -->
  <g font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="13">
    <!-- kept cells (green) -->
    <text x="138" y="117" text-anchor="end" fill="#6b7280">0</text>
    <rect x="150" y="92" width="220" height="38" rx="6" fill="#e9f7ef" stroke="#0b6e4f" stroke-width="2"/>
    <text x="260" y="116" text-anchor="middle" fill="#0b6e4f">elite / parent</text>

    <text x="138" y="155" text-anchor="end" fill="#6b7280">1</text>
    <rect x="150" y="130" width="220" height="38" rx="6" fill="#e9f7ef" stroke="#0b6e4f" stroke-width="2"/>
    <text x="260" y="154" text-anchor="middle" fill="#0b6e4f">elite / parent</text>

    <!-- offspring cells (blue) -->
    <text x="138" y="193" text-anchor="end" fill="#6b7280">2</text>
    <rect x="150" y="168" width="220" height="38" rx="6" fill="#e8f0fe" stroke="#1f6feb" stroke-width="2"/>
    <text x="260" y="192" text-anchor="middle" fill="#1f6feb">offspring</text>

    <text x="138" y="231" text-anchor="end" fill="#6b7280">3</text>
    <rect x="150" y="206" width="220" height="38" rx="6" fill="#e8f0fe" stroke="#1f6feb" stroke-width="2"/>
    <text x="260" y="230" text-anchor="middle" fill="#1f6feb">offspring</text>

    <text x="138" y="269" text-anchor="end" fill="#6b7280">4</text>
    <rect x="150" y="244" width="220" height="38" rx="6" fill="#e8f0fe" stroke="#1f6feb" stroke-width="2"/>
    <text x="260" y="268" text-anchor="middle" fill="#1f6feb">offspring</text>

    <text x="138" y="307" text-anchor="end" fill="#6b7280">5</text>
    <rect x="150" y="282" width="220" height="38" rx="6" fill="#e8f0fe" stroke="#1f6feb" stroke-width="2"/>
    <text x="260" y="306" text-anchor="middle" fill="#1f6feb">offspring</text>

    <text x="138" y="345" text-anchor="end" fill="#6b7280">6</text>
    <rect x="150" y="320" width="220" height="38" rx="6" fill="#e8f0fe" stroke="#1f6feb" stroke-width="2"/>
    <text x="260" y="344" text-anchor="middle" fill="#1f6feb">offspring</text>

    <text x="138" y="383" text-anchor="end" fill="#6b7280">7</text>
    <rect x="150" y="358" width="220" height="38" rx="6" fill="#e8f0fe" stroke="#1f6feb" stroke-width="2"/>
    <text x="260" y="382" text-anchor="middle" fill="#1f6feb">offspring</text>
  </g>

  <!-- braces -->
  <!-- green brace for kept (cells 0-1: y 92..168) -->
  <path d="M392,92 q10,0 10,12 v14 q0,12 10,12 q-10,0 -10,12 v14 q0,12 -10,12" fill="none" stroke="#0b6e4f" stroke-width="2"/>
  <text x="420" y="124" font-size="15" font-weight="700" fill="#0b6e4f">Kept solutions (Ke or Kp)</text>
  <text x="420" y="146" font-size="13" fill="#6b7280">copied to the top, unchanged</text>

  <!-- blue brace for offspring (cells 2-7: y 168..396) -->
  <path d="M392,168 q10,0 10,12 v90 q0,12 10,12 q-10,0 -10,12 v90 q0,12 -10,12" fill="none" stroke="#1f6feb" stroke-width="2"/>
  <text x="420" y="274" font-size="15" font-weight="700" fill="#1f6feb">Offspring = N &#8722; kept</text>
  <text x="420" y="296" font-size="13" fill="#6b7280">created by crossover, then mutation</text>

  <!-- footer note -->
  <line x1="40" y1="424" x2="860" y2="424" stroke="#e3e8ee" stroke-width="1.5"/>
  <text x="450" y="450" text-anchor="middle" font-size="13.5" fill="#334155">The number kept comes from the keep_elitism / keep_parents decision tree.</text>
</svg>
