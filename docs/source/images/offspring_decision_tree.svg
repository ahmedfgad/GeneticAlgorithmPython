<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6470"/>
    </marker>
  </defs>

  <!-- card background -->
  <rect x="2" y="2" width="996" height="596" rx="16" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>

  <!-- title -->
  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2d3d">How is the number of offspring decided?</text>

  <!-- ============ edges (drawn first so nodes sit on top) ============ -->
  <!-- root -> elitism (yes) -->
  <line x1="470" y1="108" x2="250" y2="195" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- root -> keep_parents (no) -->
  <line x1="530" y1="108" x2="765" y2="195" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- keep_parents -> all parents (-1) -->
  <line x1="765" y1="258" x2="215" y2="365" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- keep_parents -> none (0) -->
  <line x1="780" y1="258" x2="520" y2="365" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- keep_parents -> some (>0) -->
  <line x1="800" y1="258" x2="830" y2="365" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- edge labels (with halo for readability) -->
  <g font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" font-weight="700">
    <g text-anchor="middle">
      <rect x="332" y="138" width="44" height="22" rx="5" fill="#ffffff" opacity="0.95"/>
      <text x="354" y="154" fill="#334155">yes</text>
      <rect x="638" y="138" width="40" height="22" rx="5" fill="#ffffff" opacity="0.95"/>
      <text x="658" y="154" fill="#334155">no</text>
      <rect x="503" y="294" width="34" height="22" rx="5" fill="#ffffff" opacity="0.95"/>
      <text x="520" y="310" fill="#334155">&#8722;1</text>
      <rect x="642" y="298" width="26" height="22" rx="5" fill="#ffffff" opacity="0.95"/>
      <text x="655" y="314" fill="#334155">0</text>
      <rect x="797" y="310" width="38" height="22" rx="5" fill="#ffffff" opacity="0.95"/>
      <text x="816" y="326" fill="#334155">&gt; 0</text>
    </g>
  </g>

  <!-- ============ decision nodes ============ -->
  <!-- root -->
  <rect x="380" y="48" width="240" height="60" rx="10" fill="#eef2f7" stroke="#5b7a9d" stroke-width="2"/>
  <text x="500" y="84" text-anchor="middle" font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="16" font-weight="700" fill="#1f2d3d">keep_elitism &gt; 0 ?</text>

  <!-- keep_parents decision -->
  <rect x="620" y="198" width="320" height="60" rx="10" fill="#eef2f7" stroke="#5b7a9d" stroke-width="2"/>
  <text x="780" y="234" text-anchor="middle" font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="16" font-weight="700" fill="#1f2d3d">keep_parents = ?</text>

  <!-- ============ outcome boxes ============ -->
  <!-- elitism -->
  <rect x="60" y="198" width="320" height="124" rx="10" fill="#e9f7ef" stroke="#0b6e4f" stroke-width="2"/>
  <text x="220" y="228" text-anchor="middle" font-size="16" font-weight="700" fill="#0b6e4f">Keep Ke elites</text>
  <g font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="14" fill="#1f2d3d" text-anchor="middle">
    <text x="220" y="256">kept = Ke</text>
    <text x="220" y="278">offspring = N &#8722; Ke</text>
  </g>
  <text x="220" y="304" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6b7280">keep_parents is ignored</text>

  <!-- all parents -->
  <rect x="40" y="368" width="300" height="150" rx="10" fill="#e9f7ef" stroke="#0b6e4f" stroke-width="2"/>
  <text x="190" y="398" text-anchor="middle" font-size="16" font-weight="700" fill="#0b6e4f">Keep all parents</text>
  <g font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="14" fill="#1f2d3d" text-anchor="middle">
    <text x="190" y="426">kept = P</text>
    <text x="190" y="448">offspring = N &#8722; P</text>
  </g>
  <text x="190" y="476" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6b7280">every parent is kept</text>

  <!-- none -->
  <rect x="380" y="368" width="260" height="150" rx="10" fill="#e9f7ef" stroke="#0b6e4f" stroke-width="2"/>
  <text x="510" y="398" text-anchor="middle" font-size="16" font-weight="700" fill="#0b6e4f">Keep no parents</text>
  <g font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="14" fill="#1f2d3d" text-anchor="middle">
    <text x="510" y="426">kept = 0</text>
    <text x="510" y="448">offspring = N</text>
  </g>
  <text x="510" y="476" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6b7280">a whole new generation</text>

  <!-- some -->
  <rect x="680" y="368" width="300" height="150" rx="10" fill="#e9f7ef" stroke="#0b6e4f" stroke-width="2"/>
  <text x="830" y="398" text-anchor="middle" font-size="16" font-weight="700" fill="#0b6e4f">Keep Kp parents</text>
  <g font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="14" fill="#1f2d3d" text-anchor="middle">
    <text x="830" y="426">kept = Kp</text>
    <text x="830" y="448">offspring = N &#8722; Kp</text>
  </g>
  <text x="830" y="476" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6b7280">best Kp parents are kept</text>

  <!-- ============ legend ============ -->
  <line x1="40" y1="548" x2="960" y2="548" stroke="#e3e8ee" stroke-width="1.5"/>
  <g font-family="'DejaVu Sans Mono', 'Courier New', monospace" font-size="13.5" fill="#334155" text-anchor="middle">
    <text x="160" y="576">N = sol_per_pop</text>
    <text x="400" y="576">Ke = keep_elitism</text>
    <text x="630" y="576">Kp = keep_parents</text>
    <text x="858" y="576">P = num_parents_mating</text>
  </g>
</svg>
